<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete seu perfil | Conecta+</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.ico">

    <link rel="stylesheet" href="../../assets/styles/global.css">
    <link rel="stylesheet" href="../../components/Header/style.css">
    <link rel="stylesheet" href="perfilestudante.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"> <a href="../Home/index.html"><img src="../../assets/images/conecta-logo.png" alt="Conecta+"></a><div>
        <nav class="main-nav">
            <a href="..\Login\index.html">Entrar</a> | <a href="..\Cursos\index.html">Cursos</a> | <a href="..\home\index.html">Sobre nós</a> | <a href="..\Contato\index.html">Contato</a>
        </nav>
    </header>

    <main class="profile-container">
        <section class="profile-card">
            <h1>Complete seu perfil</h1>
            
            <div class="avatar-upload">
                <div class="avatar-placeholder"></div>
                <span>Foto de perfil</span>
            </div>

            <div class="input-group">
                <label>Áreas de interesse</label>
                <div class="interest-tags">
                    <span class="tag active">Programação</span>
                    <span class="tag active">Idiomas</span>
                    <span class="tag active">Design</span>
                    <span class="tag">Matemática</span>
                    <span class="tag">Artes</span>
                    <span class="tag">Ciências</span>
                    <span class="tag">Biologia</span>
                    <span class="tag">Português</span>
                    <span class="tag">Geografia</span>
                    <span class="tag">Sociologia</span>
                    <span class="tag">Design Gráfico</span>
                    <span class="tag">Filosofia</span>
                    <span class="tag">Física</span>
                    <span class="tag">Outros...</span>
                </div>
            </div>

            <div class="input-group">
                <label>Sobre você (opcional)</label>
                <textarea placeholder="Descreva um pouco sobre seus interesses e o que te motiva a aprender" maxlength="150"></textarea>
                <span class="char-count">0/150</span>
            </div>

            <footer class="profile-footer">
                <a href="index.html" class="btn-nav btn-voltar">Voltar</a>
                <a href="../pagina-inicial/index.html" class="btn-nav btn-avancar">Avançar ></a>
            </footer>
        </section>
    </main>
<script src="estudante.js"></script>
</body>
</html>
