<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Complete seu perfil | Conecta+</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.ico">

    <link rel="stylesheet" href="../../assets/styles/global.css">
    <link rel="stylesheet" href="../../components/Header/style.css">
    <link rel="stylesheet" href="perfileducador.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"> <a href="../Home/index.html"><img src="../../assets/images/conecta-logo.png" alt="Conecta+"></a></div>
        <nav class="main-nav">
            <a href="../Login/index.html">Entrar</a> | <a href="../Cursos/index.html">Cursos</a> | <a href="../home/index.html">Sobre nós</a> | <a href="../Contato/index.html">Contato</a>
        </nav>
    </header>

    <main class="profile-container">
        <section class="profile-card">
            <h1>Complete seu perfil como educador</h1>
            
            <div class="avatar-upload">
                <div class="avatar-placeholder"></div>
                <span>Foto de perfil</span>
            </div>

            <div class="input-row">
                <div class="input-group">
                    <label>Área de atuação</label>
                    <input type="text" placeholder="Selecione sua área de atuação" class="input-field">
                </div>
                <div class="input-group">
                    <label>Formação</label>
                    <input type="text" placeholder="Ex: Graduação, cursos..." class="input-field">
                </div>
            </div>

            <div class="input-group">
                <label>Experiência</label>
                <textarea placeholder="Descreva sua experiência como educador." maxlength="70"></textarea>
                <span class="char-count">0/70</span>
            </div>

            <div class="input-group">
                <label>Biografia</label>
                <textarea placeholder="Fale sobre você, sua trajetória e como você ensina." maxlength="70"></textarea>
                <span class="char-count">0/70</span>
            </div>

            <footer class="profile-footer">
                <a href="index.html" class="btn-nav btn-voltar">Voltar</a>
                <a href="../pagina-inicial/index.html" class="btn-nav btn-avancar">Avançar ></a>
            </footer>
        </section>
    </main>
<script src="educador.js"></script>
</body>
</html>
