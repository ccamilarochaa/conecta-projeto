<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Conecta+</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.ico">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/styles/global.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="auth-container">
        
        <section class="auth-sidebar">
            <div class="sidebar-logo">
                <a href="../Home/index.html">
                    <img src="../../assets/images/conecta-logo.png" alt="Logo Conecta+">
                </a>
            </div>
            
            <div class="sidebar-content">
                <h1 class="sidebar-title">Bem-Vindo de volta</h1>
                <p class="sidebar-subtitle">Acesse sua conta agora mesmo</p>
                <a href="..\login\index.html" class="btn-sidebar">Entrar</a>
            </div>
        </section>

        <section class="auth-form-area">
            <div class="form-wrapper">
                <header class="form-header">
                    <h2 class="form-title">Crie sua conta</h2>
                    <p class="form-subtitle">Cadastre seus dados</p>
                </header>

                <form action="#" method="POST" class="register-form">
                    
                    <div class="input-group">
                        <label for="nome">Nome completo</label>
                        <div class="input-wrapper">
                            <img src="../../assets/icons/perfil-cadastro.png" alt="Ícone" class="input-icon">
                            <input type="text" id="nome" placeholder="Digite seu nome completo" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="email">E-mail ou telefone</label>
                        <div class="input-wrapper">
                            <img src="../../assets/icons/email-cadastro.png" alt="Ícone" class="input-icon">
                            <input type="text" id="email" placeholder="Digite seu e-mail ou telefone" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="nascimento">Data de nascimento</label>
                        <div class="input-wrapper">
                            <img src="../../assets/icons/data-cadastro.png" alt="Ícone" class="input-icon">
                            <input type="text" id="nascimento" placeholder="dd/mm/aaaa" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="senha">Senha</label>
                        <div class="input-wrapper">
                            <img src="../../assets/icons/cadeado-cadastro.png" alt="Ícone" class="input-icon">
                            <input type="password" id="senha" placeholder="Digite sua senha" required>
                            <button type="button" class="btn-toggle-password">
                                <img src="../../assets/icons/olho-cadastro.png" alt="Mostrar senha">
                            </button>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="confirmar-senha">Confirmar senha</label>
                        <div class="input-wrapper">
                            <img src="../../assets/icons/cadeado2-cadastro.png" alt="Ícone" class="input-icon">
                            <input type="password" id="confirmar-senha" placeholder="Confirme sua senha" required>
                            <button type="button" class="btn-toggle-password">
                                <img src="../../assets/icons/olho-cadastro.png" alt="Mostrar senha">
                            </button>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-submit">Cadastrar-se</button>
                    </div>

                </form>
            </div>
        </section>

    </main>
<script src="cadastro.js"></script>
</body>
</html>
