<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha | Conecta+</title>
    <link rel="icon" type="image/svg+xml" href="../../assets/icons/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../../assets/styles/global.css">
    <link rel="stylesheet" href="../../components/Header/style.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="main-header">
        <div class="logo"><a href="../Home/index.html"><img src="../../assets/images/conecta-logo.png" alt="Conecta+"></a></div>
        <nav class="main-nav">
            <a href="../login/index.html">Entrar</a>
            <span class="separator">|</span>
            <a href="../Cursos/index.html">Cursos</a>
            <span class="separator">|</span>
            <a href="../Home/index.html">Sobre nós</a>
            <span class="separator">|</span>
            <a href="../sobre/index.html">Contato</a>
        </nav>
    </header>

    <main class="recovery-container">
        
        <section class="recovery-card">
            <h1 class="recovery-title">Recuperação de senha</h1>
            
            <p class="recovery-text">
                Para recuperar a sua senha, informe seu endereço de e-mail ou telefone 
                que enviaremos um link para a alteração da senha
            </p>

            <form action="#" method="POST" class="recovery-form">
                <div class="input-group">
                    <label for="email">E-mail ou telefone</label>
                    <div class="input-wrapper">
                        <img src="../../assets/icons/email-cadastro.png" alt="Ícone" class="input-icon">
                        <input type="text" id="email" placeholder="Digite seu e-mail ou telefone" required>
                    </div>
                </div>

                <button type="submit" class="btn-submit">Enviar link</button>
            </form>

            <a href="../Login/index.html" class="back-link">Voltar ao login</a>
        </section>

    </main>
<script src="recuperar.js"></script>
</body>
</html>
